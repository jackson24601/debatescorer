name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Firebase database URL
        env:
          FIREBASE_DATABASE_URL: ${{ vars.FIREBASE_DATABASE_URL || secrets.FIREBASE_DATABASE_URL }}
        run: |
          if [ -n "$FIREBASE_DATABASE_URL" ]; then
            node -e "const fs = require('node:fs'); const url = process.env.FIREBASE_DATABASE_URL; fs.writeFileSync('public/config.js', 'window.DebateScorerConfig = {\\n  databaseUrl: ' + JSON.stringify(url) + ',\\n};\\n');"
          else
            echo "FIREBASE_DATABASE_URL is not set; deploying with the placeholder config."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
